server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain
  tomcat:
    max-threads: 200
    min-spare-threads: 20
    accept-count: 100

spring:
  application:
    name: lingochat-backend

  # ── MySQL (local) ──────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/lingochat?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250
    username: lingochat_user
    password: lingochat_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: LingoHikariCP
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # ── JPA ────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true

  # ── Flyway ─────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Cache (Caffeine - in-memory for local) ─────────────────
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=5000,expireAfterWrite=3600s

# ── JWT ─────────────────────────────────────────────────────
jwt:
  # Local dev secret (change for production!)
  secret: bG9jYWwtZGV2LXNlY3JldC1rZXktZm9yLWxpbmdvY2hhdC1hcHAtbXVzdC1iZS1sb25nLWVub3VnaA==
  expiration: 86400000        # 24h
  refresh-expiration: 604800000  # 7 days

# ── Translation ──────────────────────────────────────────────
translation:
  # Options: libretranslate, google, deepl, mock
  # Use 'mock' for offline local testing (returns fake translation)
  provider: mock
  libretranslate:
    url: http://localhost:5000
    api-key: ""
  google:
    api-key: ""
  deepl:
    api-key: ""

# ── Rate limiting ────────────────────────────────────────────
rate-limit:
  api-per-minute: 300
  auth-per-hour: 20

# ── CORS (allow frontend dev server) ─────────────────────────
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
    - http://127.0.0.1:3000
    - http://127.0.0.1:5173

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    com.lingochat: DEBUG
    org.springframework.security: WARN
    org.springframework.web.socket: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss} %clr(%-5level){faint} %clr([%logger{20}]){cyan} %msg%n"

# ── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
